[app]
id = "work"
name = "Work"
namespace = "work"
defaultRoute = "plan"
intentScheme = "app"

description = "Config-driven registry for actions, routes, commands, and UI."

[app.compat]
legacyIds = ["atlassian"]
legacyEnvPrefixes = ["ATLASSIAN"]
legacyRouteHintKeys = ["__atlassianRoute"]
legacyWebviewMarkers = ["atlassian-webview"]

[metadata]
"brain.origin" = "https://localhost:3000"
"brain.healthPath" = "/healthz"
"brain.statusPath" = "/api/status"
"brain.routesPath" = "/api/routes"
"brain.eventsTopic" = "events"
"brain.eventsWsUrl" = "wss://localhost:3000/ws?topic=events"

[namespaces]
app = "work"
actions = "work"
commands = "work"
events = "work"
routes = "work"
settings = "work"

# --- Platforms / Environments ---

[platforms.vscode]
kind = "vscode"
description = "VS Code webview panel"

[platforms.web]
kind = "web"
description = "Browser via WS bridge (localhost dev)"

[platforms.remote]
kind = "remote"
description = "VS Code Remote (SSH/WSL/Codespaces)"

[environments.dev]
kind = "dev"
description = "Development mode"

[environments.prod]
kind = "prod"
description = "Installed extension"

[styles]
theme = "gold"

[styles.cssVariables]
"--app-accent" = "#EAD872"
"--app-muted" = "#5B4E2A"
"--stage-rail-width" = "48px"
"--stage-rail-active-border" = "var(--vscode-button-background)"

# --- Stages ---

[stages.plan]
id = "plan"
label = "Plan"
icon = "calendar"
order = 1
defaultRoute = "/plan"

[stages.plan.subnav]
daily = { label = "Daily", path = "/plan", order = 1 }
weekly = { label = "Weekly", path = "/plan/weekly", order = 2 }
monthly = { label = "Monthly", path = "/plan/monthly", order = 3 }
quarterly = { label = "Quarterly", path = "/plan/quarterly", order = 4 }
career = { label = "Career", path = "/plan/career", order = 5 }

[stages.execute]
id = "execute"
label = "Execute"
icon = "play"
order = 2
defaultRoute = "/execute"

[stages.execute.subnav]

[stages.review]
id = "review"
label = "Review"
icon = "eye"
order = 3
defaultRoute = "/review"

[stages.ship]
id = "ship"
label = "Ship"
icon = "rocket"
order = 4
defaultRoute = "/ship"

[stages.observe]
id = "observe"
label = "Observe"
icon = "pulse"
order = 5
defaultRoute = "/observe"

[stages.system]
id = "system"
label = "System"
icon = "gear"
order = 99
defaultRoute = "/system/settings"

[stages.system.subnav]
settings = { label = "Settings", path = "/system/settings", order = 1 }
docs = { label = "Docs", path = "/system/docs", order = 2 }
registry = { label = "Registry", path = "/system/registry", order = 3 }

# --- Storage ---

[storage.targets.settings]
kind = "settings"
scope = "workspace"

[storage.targets.secrets]
kind = "secrets"
scope = "global"

[storage.targets.globalState]
kind = "state"
scope = "global"

[storage.targets.workspaceState]
kind = "state"
scope = "workspace"

[storage.targets.workspaceFiles]
kind = "file"
scope = "workspace"

[storage.targets.globalFiles]
kind = "file"
scope = "global"

[storage.targets.webviewState]
kind = "vscodeStorage"
scope = "webview"

[storage.targets.webviewLocal]
kind = "localStorage"
scope = "webview"

[storage.targets.webviewIndexedDb]
kind = "indexeddb"
scope = "webview"

[storage.targets.extensionSqlite]
kind = "sqlite"
scope = "workspace"

[storage.targets.externalDatabase]
kind = "remoteDb"
scope = "global"

# --- Views / Routes / Actions / Commands / Events ---

[views.plan]
label = "Daily Focus"
route = "plan"

[routes.plan]
path = "/plan"
view = "plan"

[actions.appOpen]
id = "work.app.open"
command = "work.openApp"
route = "plan"

[commands.openApp]
id = "work.openApp"
kind = "vscode"
title = "Work: Open App"

[events.routeChanged]
id = "work.route.changed"
kind = "ipc"

# ── URL State Registry ──────────────────────────────────────
# Declares every app-owned query parameter.
# Used for: URL sanitization, omnibox hints, registry docs, validation.

[urlState.view]
type = "enum"
values = ["compact", "expanded", "board", "list"]
default = "compact"
description = "Layout mode for the current page"
history = "replace"

[urlState.sort]
type = "enum"
values = ["priority", "updated", "created", "status"]
default = "priority"
description = "Sort order for list views"
history = "replace"

[urlState.filter]
type = "string"
description = "Active filter expression"
history = "push"

[urlState.open]
type = "string"
description = "Dot-separated list of open/expanded sections"
history = "replace"

[urlState.q]
type = "string"
description = "Search query text"
history = "replace"

[urlState.tab]
type = "string"
description = "Active tab identifier"
history = "replace"

[urlState.focus]
type = "string"
description = "Focused item identifier (for scroll-to/highlight)"
history = "replace"

[urlState.stage]
type = "enum"
values = ["plan", "execute", "review", "ship", "observe", "system"]
description = "Active lifecycle stage override"
history = "push"

# ── Topology ───────────────────────────────────────────────
# Declares domains, derivation rules, and architectural layers.
# One config declares it, one module derives it, everything consumes it.

[topology]
defaultDomain = "app"

[topology.domains.app]
id = "app"
label = "App"
concern = "Runtime primitives, lifecycle, transport, routing, messaging"
color = "var(--color-domain-app)"

[topology.domains.identity]
id = "identity"
label = "Identity"
concern = "Authentication, credentials, accounts"
color = "var(--color-domain-identity)"

[topology.domains.content]
id = "content"
label = "Content"
concern = "Business logic, issues, triage, automations, external data"
color = "var(--color-domain-content)"

[topology.domains.view]
id = "view"
label = "View"
concern = "Presentation, theme, layout, stage views"
color = "var(--color-domain-view)"

[topology.overrides]
# VS Code commands
"work.openApp" = "app"
"work.refresh" = "app"
"work.runDevWebview" = "app"
"work.restartExtensionHost" = "app"
"work.reloadWebviews" = "app"
"work.syncEnvToSettings" = "app"
"work.reinstallExtension" = "app"
"work.login" = "identity"
"work.logout" = "identity"
"work.openIssue" = "content"
"work.startTaskTerminal" = "app"
# RPC methods
showInformation = "app"
execCommand = "app"
getState = "app"
registerChannel = "app"
unregisterChannel = "app"
sendMessage = "app"
addMessageListener = "app"
rmMessageListener = "app"
axiosGet = "app"
axiosPost = "app"
axiosPut = "app"
axiosDelete = "app"
openSettings = "app"
syncEnvToSettings = "app"
startTaskTerminal = "app"
getUniversalConfig = "app"
getFullConfig = "app"
getDocsIndex = "app"
getDocContent = "app"
revealDocAsset = "app"
openDocInEditor = "app"
restartExtensionHost = "app"
reloadWebviews = "app"
reinstallExtension = "app"
saveApiToken = "identity"
disconnect = "identity"
getIssue = "content"
listIssues = "content"
openIssueInBrowser = "content"
getTriageState = "content"
runTriage = "content"
getAutomations = "content"
getAutomationRuns = "content"
onDidOpenTextDocument = "app"
buildExtension = "app"
buildWebview = "app"
runDevWebview = "app"
getTheme = "view"
setTheme = "view"
onThemeChange = "view"
# IPC commands / events
"work.route.navigate" = "view"
"work.webview.refresh" = "app"
"work.state.updated" = "app"
"work.webview.ready" = "app"
"work.route.changed" = "view"
"work.ui.action" = "app"
"work.ui.event" = "app"

[[topology.prefixRules]]
prefix = "identity."
domain = "identity"

[[topology.prefixRules]]
prefix = "content."
domain = "content"

[[topology.prefixRules]]
prefix = "view."
domain = "view"

[[topology.prefixRules]]
prefix = "app."
domain = "app"

[[topology.prefixRules]]
prefix = "work.identity."
domain = "identity"

[[topology.prefixRules]]
prefix = "work.content."
domain = "content"

[[topology.prefixRules]]
prefix = "work.view."
domain = "view"

[[topology.prefixRules]]
prefix = "work.app."
domain = "app"

[topology.stageMap]
plan = "view"
execute = "view"
review = "view"
ship = "view"
observe = "view"
system = "app"

[topology.storageDomains]
settings = ["app", "identity", "content"]
secrets = ["identity"]
globalState = ["app"]
workspaceState = ["app"]
globalFiles = ["app"]
workspaceFiles = ["content"]
webviewState = ["view"]
webviewLocal = ["view"]
webviewIndexedDb = ["view"]
extensionSqlite = ["app", "content"]
externalDatabase = ["content"]

[topology.layers.kernel]
id = "kernel"
label = "Kernel"
concern = "Runtime primitives"
modules = ["app", "config", "messages"]

[topology.layers.identity]
id = "identity"
label = "Identity"
concern = "Authentication, credentials, accounts"
modules = ["auth"]

[topology.layers.data]
id = "data"
label = "Data"
concern = "External I/O — HTTP client, state queries"
modules = ["http"]

[topology.layers.domain]
id = "domain"
label = "Domain"
concern = "Business logic — issues, triage, automations"
modules = ["issues", "triage", "automations"]

[topology.layers.ui]
id = "ui"
label = "UI"
concern = "Presentation — theme, layout, URL state"
modules = ["theme"]

[topology.layers.work]
id = "work"
label = "Work"
concern = "Stage feature views — plan, execute, review, ship, observe"
modules = ["plan", "execute", "review", "ship", "observe"]

[topology.layers.system]
id = "system"
label = "System"
concern = "Meta — settings, docs, registry, dev tools, configuration"
modules = ["system", "settings", "docs", "dev", "universal"]
